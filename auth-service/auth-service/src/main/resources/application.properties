# ===============================
# SERVER CONFIG
# ===============================

server.port=8081
# 👉 Runs your application on port 8081 (so URL = http://localhost:8081)


# ===============================
# DATABASE CONFIG (ORACLE)
# ===============================

spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
# 👉 JDBC URL to connect to Oracle DB
# 👉 Format: jdbc:oracle:thin:@HOST:PORT:SID
# 👉 XE = default Oracle Express Edition SID

spring.datasource.username=auth_user
# 👉 Replace with your Oracle DB username (same as SQL Developer login)

spring.datasource.password=auth123
# 👉 Replace with your Oracle DB password

spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
# 👉 Oracle JDBC driver class (required to connect Java → Oracle)


# ===============================
# JPA / HIBERNATE CONFIG
# ===============================

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
# 👉 Tells Hibernate that we are using Oracle DB

spring.jpa.hibernate.ddl-auto=update
# 👉 Automatically creates/updates tables
# 👉 update = safe for development
# 👉 (create / create-drop used only for testing)

spring.jpa.show-sql=true
# 👉 Shows SQL queries in console (useful for debugging)

spring.jpa.properties.hibernate.format_sql=true
# 👉 Makes SQL logs readable (formatted nicely)


# ===============================
# OPTIONAL (GOOD PRACTICE)
# ===============================

spring.jpa.open-in-view=false
# 👉 Prevents lazy loading issues in controllers (recommended)

logging.level.org.hibernate.SQL=DEBUG
# 👉 Logs SQL queries

logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# 👉 Logs query parameters (very useful for debugging)