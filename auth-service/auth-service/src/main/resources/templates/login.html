<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flight App Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: flex;
            width: 800px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .left, .right {
            width: 50%;
            padding: 40px;
        }

        .left {
            background: #2a5298;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left h1 {
            margin-bottom: 10px;
        }

        .right h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #2a5298;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c72;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Left Side -->
    <div class="left">
        <h1>Flight Management</h1>
        <p>Manage flights, customers, and baggage in one place.</p>
    </div>

    <!-- Right Side -->
    <div class="right">

        <h2>Login</h2>
        <form action="/auth/login" method="post"> <!-- Intercepted by postmapping("/login")-->
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="divider">OR</div>

        <h2>Register</h2>
        <form action="/auth/register" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="text" name="role" placeholder="Role (USER/ADMIN)" required>
            <button type="submit">Register</button>
        </form>

    </div>

</div>

</body>
</html>
