<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Add Flight</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #070a14, #0b1020);
      color: #fff;
    }

    .container {
      max-width: 800px;
      margin: 80px auto;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    .row {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
    }

    .field {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 13px;
      margin-bottom: 5px;
      color: #aaa;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #111;
      color: #fff;
    }

    input:focus {
      border-color: #6aa6ff;
      outline: none;
    }

    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #6aa6ff, #7cf0c5);
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .user {
      text-align: right;
      margin-bottom: 10px;
      color: #ccc;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- Username -->
  <div class="user">
    Welcome, <b th:text="${username}">User</b>
  </div>

  <h2>Add Flight</h2>

  <form action="/flight/add-flight/save" method="post">

    <div class="row">
      <div class="field">
        <label>Flight Number</label>
        <input type="text" name="flightNumber" required>
      </div>

      <div class="field">
        <label>Airline</label>
        <input type="text" name="airline" required>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Source</label>
        <input type="text" name="source" required>
      </div>

      <div class="field">
        <label>Destination</label>
        <input type="text" name="destination" required>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Departure Time</label>
        <input type="time" name="departureTime" required>
      </div>

      <div class="field">
        <label>Arrival Time</label>
        <input type="time" name="arrivalTime" required>
      </div>
    </div>
    <div class="row">
  <div class="field">
    <label>Gate</label>
    <input type="text" name="gate">
  </div>

  <div class="field">
    <label>Status</label>
    <select name="status">
      <option value="ON_TIME">On Time</option>
      <option value="DELAYED">Delayed</option>
      <option value="BOARDING">Boarding</option>
    </select>
  </div>
</div>

<div class="field">
  <label>Date</label>
  <input type="date" name="date">
</div>
🟢
    <!-- Token -->
    <input type="hidden" name="token" th:value="${token}">

    <button class="btn" type="submit">Save Flight</button>

  </form>

</div>

</body>
</html>
