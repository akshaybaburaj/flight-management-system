<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Customer Booking</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #070a14, #0b1020);
      color: #fff;
    }

    .container {
      max-width: 800px;
      margin: 80px auto;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    .row {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
    }

    .field {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 13px;
      margin-bottom: 5px;
      color: #aaa;
    }

    input, select {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #111;
      color: #fff;
    }

    input:focus, select:focus {
      border-color: #6aa6ff;
      outline: none;
    }

    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #6aa6ff, #7cf0c5);
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .user {
      text-align: right;
      margin-bottom: 10px;
      color: #ccc;
    }

    .pnr-box {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      background: #0f172a;
      border: 1px solid #6aa6ff;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: #7cf0c5;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- Username -->
  <div class="user">
    Welcome, <b th:text="${username}">User</b>
  </div>

  <h2>Create Customer Booking</h2>

  <form action="/customer/save" method="post">

    <!-- Passenger Info -->
    <div class="row">
      <div class="field">
        <label>First Name</label>
        <input type="text" name="firstName" required>
      </div>

      <div class="field">
        <label>Last Name</label>
        <input type="text" name="lastName" required>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Date of Birth</label>
        <input type="date" name="dateOfBirth" required>
      </div>

      <div class="field">
        <label>Gender</label>
        <select name="gender">
          <option value="MALE">Male</option>
          <option value="FEMALE">Female</option>
          <option value="OTHER">Other</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Nationality</label>
        <input type="text" name="nationality" required>
      </div>

      <div class="field">
        <label>Passport Number</label>
        <input type="text" name="passportNumber" required>
      </div>
    </div>

    <!-- Flight Info -->
    <div class="row">
      <div class="field">
        <label>Flight Number</label>
        <input type="text" name="flightNumber" required>
      </div>

      <div class="field">
        <label>Flight Date</label>
        <input type="date" name="flightDate" required>
      </div>
    </div>

    <!-- Token -->
    <input type="hidden" name="token" th:value="${token}">

    <button class="btn" type="submit">Generate PNR & Book</button>

  </form>

  <!-- Show generated PNR -->
  <div class="pnr-box" th:if="${pnr}">
    PNR Generated: <span th:text="${pnr}"></span>
  </div>

</div>

</body>
</html>
